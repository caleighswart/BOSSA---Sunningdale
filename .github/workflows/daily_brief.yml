name: Bossa Sunningdale — Daily Stock Brief

on:
  # Runs every day at 06:00 SAST (04:00 UTC)
  schedule:
    - cron: '0 4 * * *'

  # Also allows manual trigger from GitHub Actions tab (for testing)
  workflow_dispatch:

jobs:
  send-brief:
    name: Analyse stock & send Telegram brief
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r inventory/requirements.txt

      - name: Test SSRS connection
        continue-on-error: true
        env:
          PILOTLIVE_USERNAME: ${{ secrets.PILOTLIVE_USERNAME }}
          PILOTLIVE_PASSWORD: ${{ secrets.PILOTLIVE_PASSWORD }}
        run: |
          python3 - <<'EOF'
          import os, sys, requests
          from requests_ntlm import HttpNtlmAuth
          u = os.environ.get("PILOTLIVE_USERNAME", "")
          p = os.environ.get("PILOTLIVE_PASSWORD", "")
          print(f"Username set: {bool(u)} | Password set: {bool(p)}")
          url = "https://reports.pilotlive.co.za/ReportServer?%2fStock+Management%2fTheoretical+Stock+On+Hand&rs:Command=Render&rs:Format=XML&dclink=8689"
          try:
              r = requests.get(url, auth=HttpNtlmAuth(u, p), timeout=60)
              print(f"SSRS status: {r.status_code} | Size: {len(r.content)} bytes")
              if r.status_code != 200:
                  print(f"Error body: {r.text[:500]}")
                  sys.exit(1)
              else:
                  print("SSRS connection OK")
          except Exception as e:
              print(f"SSRS connection FAILED: {e}")
              sys.exit(1)
          EOF

      - name: Run inventory agent
        working-directory: inventory
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          PILOTLIVE_USERNAME:  ${{ secrets.PILOTLIVE_USERNAME }}
          PILOTLIVE_PASSWORD:  ${{ secrets.PILOTLIVE_PASSWORD }}
        run: python main.py
