name: Bossa Sunningdale — Daily Dashboard Health Check

# Verifies once a day that:
#   1. daily_bar.yml has a successful run completed today (SAST), AND
#   2. The Netlify-served dashboard's "Updated" timestamp is today (SAST).
#
# Self-healing: if no daily_bar.yml run succeeded today and nothing is in
# progress, this workflow auto-triggers daily_bar.yml via workflow_dispatch
# (GitHub Actions occasionally drops scheduled crons under load — this
# converts that platform glitch from a dashboard outage into a ~15 min delay).
# When auto-recovery fires, we open an info-level GitHub issue so there's an
# audit trail, but exit 0 (no failure email — the system healed itself).
#
# Hard failures (fetch error, parse error, recovery failed) still open an
# issue, fail the workflow, and trigger the standard failure email.
#
# Cron: 09:33 UTC = 11:33 SAST. Sized to fire well after both scheduled
# daily_bar.yml runs (03:13 UTC and 05:17 UTC targets) have had time to
# complete given typical 4-5h GH Actions cron delays.

on:
  schedule:
    - cron: '33 9 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues:   write
  actions:  write   # needed to workflow-dispatch daily_bar.yml on cron-drop recovery

jobs:
  health-check:
    name: Verify dashboard freshness
    runs-on: ubuntu-latest

    steps:
      - name: Run health check
        env:
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:           ${{ github.repository }}
          DASHBOARD_URL:     https://bossa-sunningdale.netlify.app/
        run: |
          python3 - <<'EOF'
          import json
          import os
          import re
          import subprocess
          import sys
          import urllib.request
          from datetime import datetime, timezone, timedelta

          SAST = timezone(timedelta(hours=2))
          today_sast = datetime.now(SAST).date()
          today_str  = today_sast.isoformat()

          REPO = os.environ["GH_REPO"]

          def gh(args):
              """Run gh CLI, surface stderr on failure."""
              r = subprocess.run(args, capture_output=True, text=True)
              if r.returncode != 0:
                  sys.stderr.write(
                      f"::error::gh command failed: {' '.join(args)}\n"
                      f"stdout: {r.stdout}\nstderr: {r.stderr}\n"
                  )
                  sys.exit(2)
              return r.stdout

          problems   = []   # hard failures → open issue, fail workflow
          recoveries = []   # auto-healed   → open info issue, exit 0

          # ── 1. Did daily_bar.yml complete successfully today? ────────────────
          out = gh(["gh", "run", "list",
                    "--repo", REPO,
                    "--workflow=daily_bar.yml",
                    "--limit=10",
                    "--json", "status,conclusion,updatedAt,url"])
          runs = json.loads(out)

          in_progress = any(r["status"] in ("queued", "in_progress", "waiting") for r in runs)

          completed_today_success = False
          latest_completion = None
          for r in runs:
              if r["status"] != "completed":
                  continue
              ts = datetime.fromisoformat(r["updatedAt"].replace("Z", "+00:00")).astimezone(SAST)
              if latest_completion is None:
                  latest_completion = (r, ts)
              if ts.date() == today_sast and r["conclusion"] == "success":
                  completed_today_success = True
                  break

          # If no successful run today and nothing is in progress, GitHub
          # almost certainly dropped both scheduled crons. Self-heal by
          # triggering daily_bar.yml via workflow_dispatch.
          skip_dashboard_check = False
          if not completed_today_success:
              if in_progress:
                  print("ℹ️  daily_bar.yml is still running — skipping alert, will retry tomorrow.")
                  sys.exit(0)

              print("⚠️  No successful daily_bar.yml run today — auto-triggering as recovery.")
              trigger = subprocess.run(
                  ["gh", "workflow", "run", "daily_bar.yml",
                   "--repo", REPO, "--ref", "main"],
                  capture_output=True, text=True,
              )
              if trigger.returncode != 0:
                  problems.append(
                      "GitHub Actions did not fire the scheduled `daily_bar.yml` today "
                      "AND auto-recovery failed: "
                      f"`{trigger.stderr.strip() or trigger.stdout.strip()}`. "
                      "Trigger the workflow manually."
                  )
              else:
                  recoveries.append(
                      "GitHub Actions did not fire the scheduled `daily_bar.yml` today. "
                      f"Health check auto-triggered it at "
                      f"{datetime.now(SAST).strftime('%H:%M SAST')} — "
                      "dashboard should refresh within ~3 min."
                  )
                  # Skip the freshness check below — bar is about to run.
                  skip_dashboard_check = True

          # ── 2. Is the Netlify-served dashboard fresh? ────────────────────────
          dashboard_url = os.environ["DASHBOARD_URL"]
          html = ""
          if skip_dashboard_check:
              print("ℹ️  Skipping dashboard freshness check — bar workflow just triggered.")
          else:
              try:
                  req = urllib.request.Request(
                      dashboard_url,
                      headers={"Cache-Control": "no-cache", "User-Agent": "bossa-health-check/1"},
                  )
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      html = resp.read().decode("utf-8", errors="ignore")
              except Exception as e:
                  problems.append(f"Could not fetch dashboard at {dashboard_url}: {e}")

          if html:
              m = re.search(
                  r'Updated\s+(\d+)\s+(\w+)\s+(\d{4}),\s+(\d{2}):(\d{2})\s+SAST',
                  html,
              )
              if not m:
                  problems.append(
                      "Couldn't find `Updated <date>` line in dashboard HTML — "
                      "template may have changed."
                  )
              else:
                  day, mon, year, hh, mm = m.groups()
                  try:
                      dashboard_dt = datetime.strptime(
                          f"{day} {mon} {year} {hh}:{mm}",
                          "%d %b %Y %H:%M",
                      ).replace(tzinfo=SAST)
                      if dashboard_dt.date() != today_sast:
                          problems.append(
                              f"Dashboard timestamp is **{dashboard_dt.strftime('%d %b %Y %H:%M SAST')}** "
                              f"but today (SAST) is **{today_str}**. "
                              f"Likely Netlify did not deploy the latest commit."
                          )
                  except ValueError as e:
                      problems.append(f"Couldn't parse dashboard timestamp: {e}")

          # ── 3. Healthy → exit ────────────────────────────────────────────────
          if not problems and not recoveries:
              print("✅ Healthy — dashboard refreshed today (SAST).")
              sys.exit(0)

          # ── 4. Open or skip a deduped issue ──────────────────────────────────
          actions_url = f"https://github.com/{os.environ['GH_REPO']}/actions"

          if problems:
              title = f"⚠️ Bar dashboard health check failed — {today_str}"
              body_lines = ["Hard failures:"]
              body_lines += [f"- {p}" for p in problems]
              if recoveries:
                  body_lines += ["", "Auto-recovered (informational):"]
                  body_lines += [f"- {r}" for r in recoveries]
          else:
              title = f"ℹ️ Bar dashboard auto-recovered — {today_str}"
              body_lines = ["GitHub Actions dropped a scheduled run; "
                            "health check self-healed:"]
              body_lines += [f"- {r}" for r in recoveries]

          body = (
              f"Health check on **{today_str}** (SAST):\n\n"
              + "\n".join(body_lines)
              + "\n\n"
              + f"See [GitHub Actions]({actions_url}).\n\n"
              + "_Opened automatically by `health_check.yml`._\n"
          )

          existing = gh(["gh", "issue", "list",
                         "--repo", REPO,
                         "--state=open",
                         "--search", f'in:title "{title}"',
                         "--json", "number"])
          dups = json.loads(existing)
          if dups:
              print(f"Issue already open (#{dups[0]['number']}); not re-opening.")
          else:
              gh(["gh", "issue", "create",
                  "--repo", REPO,
                  "--title", title,
                  "--body",  body])
              print("Opened issue.")

          # Hard failures fail the workflow (triggers the standard email).
          # Pure auto-recovery exits 0 (issue is the audit trail; no email noise).
          if problems:
              for p in problems:
                  print(f"::error::{p}")
              sys.exit(1)
          print("✅ Auto-recovered — exiting 0.")
          sys.exit(0)
          EOF
