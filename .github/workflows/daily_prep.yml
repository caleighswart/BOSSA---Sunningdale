name: Bossa Sunningdale — Daily Prep List (disabled)

# Disabled 2026-05-13: prep brief no longer used. Telegram output dropped in
# favour of the bar dashboard. Workflow kept dormant (manual trigger only) in
# case the prep brief is revived. Re-enable by restoring the schedule.
on:
  workflow_dispatch:

jobs:
  send-prep-list:
    name: Generate & send chef prep list
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r prep/requirements.txt

      - name: Run prep bot
        working-directory: prep
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          PILOTLIVE_USERNAME: ${{ secrets.PILOTLIVE_USERNAME }}
          PILOTLIVE_PASSWORD: ${{ secrets.PILOTLIVE_PASSWORD }}
        run: python main.py
