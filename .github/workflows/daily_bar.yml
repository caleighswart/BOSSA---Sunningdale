name: Bossa Sunningdale — Daily Bar Stock Dashboard

on:
  # Two scheduled runs per day, ~2h apart, to harden against GitHub Actions
  # silently dropping a scheduled cron (a known platform issue). The dashboard
  # generator is fully idempotent and the commit step is "nothing to commit"
  # safe, so running twice on a normal day is harmless.
  #   Primary : 03:13 UTC = 05:13 SAST target (lands ~07:13–08:13 SAST)
  #   Backup  : 05:17 UTC = 07:17 SAST target (lands ~09:17–10:17 SAST)
  # If GitHub drops *both*, the 11:33 SAST health check auto-triggers a run.
  schedule:
    - cron: '13 3 * * *'
    - cron: '17 5 * * *'

  # Manual trigger from the Actions tab (for testing / recovery)
  workflow_dispatch:

jobs:
  refresh-dashboard:
    name: Refresh bar stock dashboard
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to push docs/index.html so Netlify auto-deploys it

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r bar/requirements.txt

      - name: Test SSRS connection
        continue-on-error: true
        env:
          PILOTLIVE_USERNAME: ${{ secrets.PILOTLIVE_USERNAME }}
          PILOTLIVE_PASSWORD: ${{ secrets.PILOTLIVE_PASSWORD }}
        run: |
          python3 - <<'EOF'
          import os, sys, requests
          from requests_ntlm import HttpNtlmAuth
          u = os.environ.get("PILOTLIVE_USERNAME", "")
          p = os.environ.get("PILOTLIVE_PASSWORD", "")
          print(f"Username set: {bool(u)} | Password set: {bool(p)}")
          url = "https://reports.pilotlive.co.za/ReportServer?%2fStock+Management%2fTheoretical+Stock+On+Hand&rs:Command=Render&rs:Format=XML&dclink=8689"
          try:
              r = requests.get(url, auth=HttpNtlmAuth(u, p), timeout=60)
              print(f"SSRS status: {r.status_code} | Size: {len(r.content)} bytes")
              if r.status_code != 200:
                  print(f"Error body: {r.text[:500]}")
                  sys.exit(1)
              else:
                  print("SSRS connection OK")
          except Exception as e:
              print(f"SSRS connection FAILED: {e}")
              sys.exit(1)
          EOF

      - name: Generate dashboard
        working-directory: bar
        env:
          PILOTLIVE_USERNAME:    ${{ secrets.PILOTLIVE_USERNAME }}
          PILOTLIVE_PASSWORD:    ${{ secrets.PILOTLIVE_PASSWORD }}
          BOSSA_ORDERS_WEBHOOK:  ${{ secrets.BOSSA_ORDERS_WEBHOOK }}
        run: python generate_dashboard.py

      - name: Commit dashboard for Netlify deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          if git diff --cached --quiet; then
            echo "Dashboard unchanged — nothing to commit."
          else
            git commit -m "chore: update bar stock dashboard"
            git push
          fi
